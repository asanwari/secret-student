services:
  app:
    environment:
      LLM_RUNTIME: external
      LLM_BASE_URL: http://llama-cpp:8000
      LLM_API_KEY: ${LLAMA_CPP_API_KEY:-local-dev-key}
      LLM_MODEL: ${LLAMA_CPP_MODEL_REF:-ggml-org/NVIDIA-Nemotron-3-Nano-Omni:Q4_K_M}
    depends_on:
      llama-cpp:
        condition: service_healthy

  llama-cpp:
    image: ${LLAMA_CPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda-b9049}
    restart: unless-stopped
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      LLAMA_CACHE: /root/.cache/llama.cpp
      HF_XET_HIGH_PERFORMANCE: "1"
    volumes:
      - llama_cpp_cache:/root/.cache/llama.cpp
      - hf_cache:/root/.cache/huggingface
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >
        exec /app/llama-server
        --host 0.0.0.0
        --port 8000
        -hf ${LLAMA_CPP_MODEL_REF:-ggml-org/NVIDIA-Nemotron-3-Nano-Omni:Q4_K_M}
        --ctx-size ${LLAMA_CPP_CTX_SIZE:-8192}
        --n-gpu-layers ${LLAMA_CPP_GPU_LAYERS:-999}
        --threads ${LLAMA_CPP_THREADS:-8}
        --parallel ${LLAMA_CPP_PARALLEL:-1}
        --api-key ${LLAMA_CPP_API_KEY:-local-dev-key}
        ${LLAMA_CPP_EXTRA_ARGS:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 90
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  llama_cpp_cache:
  hf_cache:
